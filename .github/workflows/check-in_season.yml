name: Check if forecast date is in season

on:
  workflow_call:
    outputs:
      in_season:
        description: "Whether a forecast should run"
        value: ${{ jobs.check.outputs.in_season }}

  workflow_dispatch:

jobs:

  check_in_season:
    runs-on: ubuntu-latest

    outputs:
      in_season: ${{ steps.season.outputs.in_season }}

    steps:
    - name: check_in_season
      shell: bash
      run: |

        TODAY=$(date -u +%F)   # YYYY-MM-DD
        YEAR=$(date -u +%Y)
        MONTH=$(date -u +%m)

        echo "Today is $TODAY"
        echo "Event is ${{ github.event_name }}"

        # manual dispatch always allowed
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "in_season=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Determine which seasonal window applies
        #
        # Oct-Dec  -> current season started this year
        # Jan-May  -> current season started previous year

        if [[ $MONTH -ge 10 ]]; then
          START_DATE="${YEAR}-10-07"
          END_DATE="$((YEAR + 1))-05-21"
        else
          START_DATE="$((YEAR - 1))-10-07"
          END_DATE="${YEAR}-05-21"
        fi

        echo "Season start: $START_DATE"
        echo "Season end:   $END_DATE"

        if [[ "$TODAY" > "$START_DATE" || "$TODAY" == "$START_DATE" ]] && \
          [[ "$TODAY" < "$END_DATE"   || "$TODAY" == "$END_DATE" ]]; then

          echo "in_season=true" >> $GITHUB_OUTPUT

        else
          echo "in_season=false" >> $GITHUB_OUTPUT
        fi