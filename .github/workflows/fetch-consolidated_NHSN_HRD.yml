name: Fetch consolidated NHSN HRD dataset

on:
# +---------------- minute (0 - 59)
# |  +------------- hour (0 - 23)
# |  |  +---------- day of month (1 - 31)
# |  |  |  +------- month (1 - 12)
# |  |  |  |  +---- day of week (0 - 6) (Sunday=0 or 7)
# |  |  |  |  |
# *  *  *  *  *  command to be executed
  schedule:
    - cron: '0 12 * * 0' # Runs every Sunday at 8:00 AM EDT (12:00 PM UTC)
  workflow_dispatch:      # Allows manual triggering

permissions:
  contents: write         # Grants permission to push changes
  pull-requests: write    # Grants permission to create PRs

jobs:

  fetch_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: BENTOLAB-HIERARCHSIR 
          environment-file: BENTOLAB-HIERARCHSIR_conda-env.yml  

      - name: Run data collection script
        shell: bash -l {0}
        run: |

          # needs the '-l {0}' flag to use the initialised conda environment

          python data/conversion/cases/fetch-format_NHSN-HRD-data.py --preliminary False

      - name: Commit changes to a new feature branch
        shell: bash -l {0}
        run: |

          # generate timestamped branch name and store as environmental variable
          BRANCH_NAME="consolidated-data-update-$(date +'%Y%m%d%H%M%S')"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

          # configure git
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "$BRANCH_NAME"
          
          # stage ONLY the data file
          git add -A
          git commit -m "NHSN HRD consolidated data update on $(date +'%Y-%m-%d %H:%M:%S')"

          # push changes
          git push origin "$BRANCH_NAME"

      - name: Create a pull request
        shell: bash -l {0}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          gh pr create --base main --head ${{ env.BRANCH_NAME }} --title "Automated NHSN HRD Consolidated Data Update" --body "This PR includes the latest update of the consolidated NHSN HRD data."
      
      # merge and delete were split on 01-04-2026 
      - name: Merge pull request
        shell: bash -l {0}
        run: |
          gh pr merge --squash
      
      # deletion failure after 5 retries won't stop the pipeline
      - name: Delete branch
        shell: bash -l {0}
        run: |
          for i in {1..5}; do
            echo "Attempt $i to delete branch..."

            if gh api -X DELETE repos/${{ github.repository }}/git/refs/heads/${{ env.BRANCH_NAME }}; then
              echo "Branch deleted"
              break
            fi

            echo "Delete failed, retrying in 10 seconds..."
            sleep 10
          done

